name: Release Security Review

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write
  actions: read


jobs:
  release-security-review:
    name: Run Release Security Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate review evidence
        run: |
          mkdir -p reports
          python3 ai-reviewer/review_changed_files.py
          python3 ai-reviewer/finding_triage_assistant.py
          python3 ai-reviewer/release_security_review.py
          python3 ai-reviewer/security_intelligence.py
          python3 ai-reviewer/ai_remediation_assistant.py
          python3 ai-reviewer/review_changed_files.py --profile insecure --output reports/ai-assisted-security-review-insecure.md
          python3 ai-reviewer/review_changed_files.py --profile secure --output reports/ai-assisted-security-review-secure.md
          python3 dashboard/generate_dashboard.py

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/ai-assisted-findings.sarif

      - name: Upload release review report
        uses: actions/upload-artifact@v4
        with:
          name: release-security-review
          path: |
            reports/ai-assisted-security-review.md
            reports/finding-triage-report.md
            reports/release-security-review.md
            reports/executive-release-summary.md
            reports/ai-assisted-remediation-plan.md
            reports/security-risk-score.md
            reports/ai-assisted-findings.sarif
            dashboard/security-dashboard.html
            dashboard/secure-sdlc-metrics.prom
