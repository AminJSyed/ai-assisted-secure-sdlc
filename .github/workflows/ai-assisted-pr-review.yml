name: AI-Assisted PR Security Review

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ai-assisted-pr-review:
    name: Run AI-Assisted PR Security Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        run: |
          mkdir -p reports

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}"
            git diff --name-only "origin/${{ github.base_ref }}...HEAD" > reports/changed-files-all.txt
          else
            find fixtures ai-reviewer docs .github policy dashboard monitoring -type f > reports/changed-files-all.txt
          fi

          echo "All changed files:"
          cat reports/changed-files-all.txt

          > reports/changed-files.txt

          while IFS= read -r file; do
            if [ -f "$file" ]; then
              echo "$file" | grep -E '\.(py|yml|yaml|json|Dockerfile|dockerfile|tf|sh|bash|js|ts|go|java|cs|rb|php)$|(^|/)Dockerfile$' >> reports/changed-files.txt || true
            else
              echo "Skipping deleted or missing file: $file"
            fi
          done < reports/changed-files-all.txt

          echo ""
          echo "Security-relevant existing files selected for review:"
          cat reports/changed-files.txt || true

      - name: Run AI-assisted security review on changed files
        run: |
          FILES=$(cat reports/changed-files.txt | tr '\n' ' ')

          if [ -z "$FILES" ]; then
            {
              echo "# AI-Assisted Security Review"
              echo ""
              echo "Decision: PASS"
              echo ""
              echo "No security-relevant existing changed files detected. Documentation, images, deleted files, and non-executable assets were skipped."
            } > reports/ai-assisted-security-review.md
          else
            python3 ai-reviewer/review_changed_files.py \
              --paths $FILES \
              --output reports/ai-assisted-security-review.md
          fi

          cat reports/ai-assisted-security-review.md

      - name: Run finding triage assistant
        run: |
          python3 ai-reviewer/finding_triage_assistant.py

      - name: Create PR security review comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          {
            echo "## AI-Assisted PR Security Review"
            echo ""
            echo "This is an advisory security review generated by the Secure SDLC workflow."
            echo ""
            echo "### All changed files"
            echo ""
            echo "<pre>"
            cat reports/changed-files-all.txt || true
            echo "</pre>"
            echo ""
            echo "### Security-relevant existing files reviewed"
            echo ""
            echo "<pre>"
            cat reports/changed-files.txt || true
            echo "</pre>"
            echo ""
            echo "### Review summary"
            echo ""
            cat reports/ai-assisted-security-review.md || true
            echo ""
            echo "### Human approval note"
            echo ""
            echo "This review is advisory. High-risk findings require human validation before merge."
          } > reports/pr-comment.md

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            -f body="$(cat reports/pr-comment.md)"

      - name: Upload PR review reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-assisted-pr-security-review
          path: |
            reports/changed-files-all.txt
            reports/changed-files.txt
            reports/ai-assisted-security-review.md
            reports/finding-triage-report.md
            reports/pr-comment.md

      - name: Enforce advisory security gate
        run: |
          if grep -q "Decision: BLOCK RECOMMENDED" reports/ai-assisted-security-review.md; then
            echo "AI-assisted security gate failed: BLOCK RECOMMENDED"
            exit 1
          fi

          echo "AI-assisted security gate passed."
