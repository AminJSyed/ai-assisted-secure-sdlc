name: AI-Assisted PR Security Review

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ai-assisted-pr-review:
    name: Run AI-Assisted PR Security Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        run: |
          mkdir -p reports

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}"
            git diff --name-only "origin/${{ github.base_ref }}...HEAD" > reports/changed-files.txt
          else
            find fixtures ai-reviewer docs .github -type f > reports/changed-files.txt
          fi

          echo "Changed files:"
          cat reports/changed-files.txt

      - name: Run AI-assisted security review on changed files
        run: |
          FILES=$(cat reports/changed-files.txt | tr '\n' ' ')

          if [ -z "$FILES" ]; then
            python3 - <<'PY'
            from pathlib import Path

            Path("reports").mkdir(exist_ok=True)
            Path("reports/ai-assisted-security-review.md").write_text(
                "# AI-Assisted Security Review\n\n"
                "Decision: PASS\n\n"
                "No changed files detected.\n"
            )
            PY
          else
            python3 ai-reviewer/review_changed_files.py \
              --paths $FILES \
              --output reports/ai-assisted-security-review.md
          fi

      - name: Run finding triage assistant
        run: |
          python3 ai-reviewer/finding_triage_assistant.py

      - name: Create PR security review comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          report_path = Path("reports/ai-assisted-security-review.md")
          changed_path = Path("reports/changed-files.txt")

          report = report_path.read_text() if report_path.exists() else "No report generated."
          changed = changed_path.read_text() if changed_path.exists() else "No changed files captured."

          body = (
              "## AI-Assisted PR Security Review\n\n"
              "This is an advisory security review generated by the Secure SDLC workflow.\n\n"
              "### Changed files\n\n"
              "<pre>\n"
              f"{changed}"
              "</pre>\n\n"
              "### Review summary\n\n"
              f"{report}\n\n"
              "### Human approval note\n\n"
              "This review is advisory. High-risk findings require human validation before merge.\n"
          )

          payload = json.dumps({"body": body})
          repo = os.environ["REPO"]
          pr_number = os.environ["PR_NUMBER"]
          url = f"https://api.github.com/repos/{repo}/issues/{pr_number}/comments"

          subprocess.run(
              [
                  "curl",
                  "-sS",
                  "-X",
                  "POST",
                  "-H",
                  "Accept: application/vnd.github+json",
                  "-H",
                  f"Authorization: Bearer {os.environ['GH_TOKEN']}",
                  "-H",
                  "X-GitHub-Api-Version: 2022-11-28",
                  url,
                  "-d",
                  payload,
              ],
              check=True,
          )
          PY

      - name: Upload PR review reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-assisted-pr-security-review
          path: |
            reports/changed-files.txt
            reports/ai-assisted-security-review.md
            reports/finding-triage-report.md

      - name: Enforce advisory security gate
        run: |
          if grep -q "Decision: BLOCK RECOMMENDED" reports/ai-assisted-security-review.md; then
            echo "AI-assisted security gate failed: BLOCK RECOMMENDED"
            exit 1
          fi

          echo "AI-assisted security gate passed."
